<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to Twitter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="logo-header">
        <i class="fa-brands fa-twitter" style="color: #1DA1F2; font-size: 24px;"></i>
        <span class="logo-text">Twitter</span>
    </div>

    <div class="login-container">
        <div class="login-icon">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </div>
        
        <h2>Log in to Twitter</h2>
        <p class="subtitle">Manage your account, check notifications, interact with tweets, and more.</p>

        <form action="#" method="POST" class="login-form">
            <div class="input-group">
                <i class="fa-regular fa-envelope input-icon"></i>
                <input type="text" placeholder="Email or username" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock input-icon"></i>
                <input type="password" placeholder="Password" required>
                <i class="fa-regular fa-eye-slash hide-password"></i>
            </div>
            
            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Log In</button>
        </form>

        <div class="divider">
            <span>Or log in with</span>
        </div>

        <div class="social-login">
            <button class="social-btn"><i class="fa-brands fa-google"></i></button>
            <button class="social-btn"><i class="fa-brands fa-facebook-f"></i></button>
            <button class="social-btn"><i class="fa-brands fa-apple"></i></button>
        </div>
    </div>

    <footer class="warning-footer">
        <div class="warning-content">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <p><strong>PERINGATAN:</strong> Halaman ini adalah simulasi edukasi keamanan cyber, perhatikan url sebelum memasukan data sensitive.</p>
        </div>
    </footer>
</body>
</html>
